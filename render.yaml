# Render Blueprint：https://render.com/docs/blueprint-spec
# 在 Dashboard 选 New → Blueprint → 连接 GitHub 仓库 nicolrjbit/Anchor 即可一键部署
services:
  - type: web
    name: anchor
    runtime: python
    plan: free
    region: singapore
    rootDir: anchor-backend
    buildCommand: pip install -r requirements.txt && python db/init_db.py
    startCommand: bash render_start.sh
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DEEPSEEK_API_KEY
        sync: false
